name: Nano LeetCode CI/CD

on:
  pull_request:
    branches:
      - prod
  push:
    branches:
      - prod
  workflow_dispatch:

concurrency:
  group: web-production
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
      GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
      JUDGE0_URL: ${{ secrets.JUDGE0_URL }}
      JUDGE0_API_KEY: ${{ secrets.JUDGE0_API_KEY }}
      JUDGE0_HOST: ${{ secrets.JUDGE0_HOST }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      BETTER_AUTH_SECRET: ${{ secrets.AUTH_SECRET }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install

      - name: Generate Prisma client
        run: bun run --cwd packages/db prisma:generate

      - name: Build monorepo
        run: bun run build

      # Enable these after the current repo issues are fixed:
      # - name: Lint
      #   run: bun run lint
      #
      # - name: Type check
      #   run: bun run check-types

  deploy:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/prod'
    runs-on: ubuntu-latest
    environment: production
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      BETTER_AUTH_SECRET: ${{ secrets.AUTH_SECRET }}

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.4
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DATABASE_URL,BETTER_AUTH_SECRET
          script: |
            set -euo pipefail

            # Change directory to the project root
            cd projects/nano-Leetcode
            # Pull latest code from the prod branch
            git pull --ff-only origin prod
            # Install dependencies with Bun
            bun install
            # Generate Prisma client in the packages/db directory
            bun run --cwd packages/db prisma:generate
            # Build the monorepo
            bun run build

            pm2 describe litecode-web > /dev/null 2>&1
            pm2 restart litecode-web
