name: Nano LeetCode CI/CD

on:
  pull_request:
    branches:
      - prod
  push:
    branches:
      - prod
  workflow_dispatch:

concurrency:
  group: web-production
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build monorepo
        run: bun run build

      # Enable these after the current repo issues are fixed:
      # - name: Lint
      #   run: bun run lint
      #
      # - name: Type check
      #   run: bun run check-types

  deploy:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/prod'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.4
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            cd /var/www/nano-leetcode
            git pull --ff-only origin prod
            bun install --frozen-lockfile
            bun run build

            if pm2 describe nano-leetcode-web > /dev/null 2>&1; then
              pm2 restart nano-leetcode-web
            else
              pm2 start "bun run --cwd apps/web start" --name nano-leetcode-web
            fi
